# This special JDBC URL will automatically start a PostgreSQL container using Testcontainers
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Flyway should use the same datasource
spring.flyway.url=${spring.datasource.url}

# Other test-specific properties
spring.jpa.show-sql=false
logging.level.org.springframework.security=INFO
