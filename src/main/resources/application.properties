spring.application.name=challenger

# --- Database settings are provided by the environment (e.g., Docker Compose) ---

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Settings ---
# Use environment variables for secrets in production
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNhbXBsZS1iYXNlNjQtZW5jb2RlZC1zZWNyZXQta2V5LXRoYXQtaXMtc3VmZmljaWVudGx5LWxvbmc=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Logging ---
#logging.level.org.springframework.security=DEBUG
#logging.level.org.flywaydb=INFO

logging.level.com.innovationCampus.challenger=DEBUG
logging.level.org.springframework.web=DEBUG
logging.exception-conversion-word=%wEx{full}

server.port=8081
