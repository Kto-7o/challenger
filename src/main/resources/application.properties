spring.application.name=challenger

# --- Database & Flyway ---
# ???? ?????????? ? Docker, ???????? localhost ?? ??? ??????? ?? (????????, postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/myapp_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ????????? Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Security (OAuth2 & JWT via Keycloak) ---
# issuer-uri ? ??? ???? ? ?????? Realm ? Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/myrealm
# URL ??? ???????? ????????? ?????? (JWKS) ??? ???????? ??????? JWT
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/myrealm/protocol/openid-connect/certs

# --- ?????????????? ????????? OAuth2 (???? ????? Client ID) ---
# spring.security.oauth2.client.registration.keycloak.client-id=my-client
# spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO
