spring.application.name=challenger

# --- Database & Flyway ---
# ???? ?????????? ? Docker, ???????? localhost ?? ??? ??????? ?? (????????, postgres)
spring.datasource.url=jdbc:postgresql://db:5432/myapp_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ????????? Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Security (OAuth2 & JWT via Keycloak) ---
client-id=springApplication
resource-url=http://keycloak:8080/realms/challenges/protocol/openid-connect/token
grant-type=password
spring.security.oauth2.client.registration.keycloak.client-secret=OEpSlm9fUxHuUH8tN2UqIpGLSg88qfcs

spring.security.oauth2.client.registration.keycloak.client-id=springApplication
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://keycloak:8080/realms/challenges
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/challenges

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO

server.port=8081